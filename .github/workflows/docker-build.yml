name: Build & Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      # ── Build cortex-api (Dashboard API + Web) ──
      - name: Build & Push cortex-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.dashboard-api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-api:${{ steps.meta.outputs.sha_short }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build cortex-mcp (MCP Gateway) ──
      - name: Build & Push cortex-mcp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.hub-mcp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-mcp:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-mcp:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build cortex-gitnexus (Code Intelligence) ──
      - name: Build & Push cortex-gitnexus
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.gitnexus
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-gitnexus:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-gitnexus:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🚀 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| cortex-api | \`latest\`, \`${{ steps.meta.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| cortex-mcp | \`latest\`, \`${{ steps.meta.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| cortex-gitnexus | \`latest\`, \`${{ steps.meta.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Watchtower will auto-pull within 5 minutes." >> $GITHUB_STEP_SUMMARY
