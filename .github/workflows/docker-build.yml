name: Build & Push Docker Images

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'infra/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - 'version.json'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          VERSION=$(node -p 'require("./version.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build & Push cortex-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.dashboard-api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-api:v${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-api:${{ steps.meta.outputs.sha_short }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=cortex-api
          cache-to: type=gha,scope=cortex-api,mode=max

      - name: Build & Push cortex-mcp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.hub-mcp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-mcp:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-mcp:v${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-mcp:${{ steps.meta.outputs.sha_short }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=cortex-mcp
          cache-to: type=gha,scope=cortex-mcp,mode=max

      - name: Build & Push cortex-gitnexus
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.gitnexus
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-gitnexus:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-gitnexus:v${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cortex-gitnexus:${{ steps.meta.outputs.sha_short }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=cortex-gitnexus
          cache-to: type=gha,scope=cortex-gitnexus,mode=max

      - name: Summary
        shell: bash
        run: |
          echo "## Docker Images Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| cortex-api | latest, v${{ steps.meta.outputs.version }}, ${{ steps.meta.outputs.sha_short }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| cortex-mcp | latest, v${{ steps.meta.outputs.version }}, ${{ steps.meta.outputs.sha_short }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| cortex-gitnexus | latest, v${{ steps.meta.outputs.version }}, ${{ steps.meta.outputs.sha_short }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Previous in-progress Docker builds for the same branch are auto-cancelled by workflow concurrency." >> "$GITHUB_STEP_SUMMARY"
