# Cortex Hub MCP Server
name = "cortex-hub-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev subdomain
workers_dev = true

# Optional custom domain route (set this for your Cloudflare zone)
# routes = [{ pattern = "mcp.your-domain.tld", custom_domain = true }]

[vars]
# Backend service URLs (override for your deployment)
QDRANT_URL = "https://qdrant.your-domain.tld"
MEM9_URL = "https://mem9.your-domain.tld"
CLIPROXY_URL = "https://llm.your-domain.tld"
DASHBOARD_API_URL = "https://api.your-domain.tld"

# MCP Server metadata
MCP_SERVER_NAME = "cortex-hub"
MCP_SERVER_VERSION = "0.1.0"
