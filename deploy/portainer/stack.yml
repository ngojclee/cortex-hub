version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: cortex-qdrant
    restart: unless-stopped
    volumes:
      - /home/Docker/cortex-hub/qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  gitnexus:
    image: ghcr.io/ngojclee/cortex-gitnexus:latest
    container_name: cortex-gitnexus
    restart: unless-stopped
    volumes:
      - /home/Docker/cortex-hub/gitnexus-data:/root/.gitnexus
      - /home/Docker/cortex-hub/api-data:/app/data
    environment:
      TZ: ${TZ:-Europe/Paris}
      PORT: 4848

  cortex-api:
    image: ghcr.io/ngojclee/cortex-api:latest
    container_name: cortex-api
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "3000:4000"
    volumes:
      - /home/Docker/cortex-hub/api-data:/app/data
      - /home/Docker/cortex-hub/gitnexus-data:/root/.gitnexus
      - /home/Docker/cortex-hub/cliproxy-auth:/app/cliproxy-auth
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-Europe/Paris}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_PATH: /app/data/cortex.db
      QDRANT_URL: http://qdrant:6333
      LLM_PROXY_URL: ${LLM_PROXY_URL:-http://llm-proxy:8317}
      CLIPROXY_MANAGEMENT_KEY: ${CLIPROXY_MANAGEMENT_KEY:-cortex2026}
      GITNEXUS_URL: http://gitnexus:4848
      DASHBOARD_URL: ${DASHBOARD_URL}
    depends_on:
      qdrant:
        condition: service_started
      gitnexus:
        condition: service_started

  cortex-mcp:
    image: ghcr.io/ngojclee/cortex-mcp:latest
    container_name: cortex-mcp
    restart: unless-stopped
    ports:
      - "8318:8317"
    environment:
      TZ: ${TZ:-Europe/Paris}
      PORT: 8317
      NODE_ENV: ${NODE_ENV:-production}
      DASHBOARD_API_URL: http://cortex-api:4000
      QDRANT_URL: http://qdrant:6333
      CLIPROXY_URL: ${LLM_PROXY_URL:-http://llm-proxy:8317}
      GITNEXUS_URL: http://gitnexus:4848
      MCP_SERVER_NAME: cortex-hub
      MCP_SERVER_VERSION: "0.1.0"
    depends_on:
      cortex-api:
        condition: service_started
      qdrant:
        condition: service_started
      gitnexus:
        condition: service_started

  watchtower:
    image: containrrr/watchtower:latest
    container_name: cortex-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "false"
      DOCKER_API_VERSION: "1.43"
