# Cortex Hub — Docker Compose Stack
# Services: Qdrant (Vector DB), CLIProxy (LLM Gateway), GitNexus (Code Intelligence),
#           Cortex API (Dashboard API + Web), Cortex MCP (MCP Gateway), Watchtower (Auto-updater)

services:
  # ── Vector Database ──
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: cortex-qdrant
    restart: unless-stopped
    volumes:
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/qdrant-data:/qdrant/storage
    environment:
      TZ: ${TZ:-Europe/Paris}
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/6333) 2>/dev/null'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── LLM Proxy (OpenAI-compatible gateway) ──
  llm-proxy:
    image: eceasy/cli-proxy-api:latest
    container_name: cortex-llm-proxy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "mkdir -p /CLIProxyAPI/auth && printf 'port: 8317\\nauth-dir: /CLIProxyAPI/auth\\n' > /CLIProxyAPI/config.yaml && exec /CLIProxyAPI/CLIProxyAPI"]
    volumes:
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/cliproxy-auth:/CLIProxyAPI/auth
    environment:
      TZ: ${TZ:-Europe/Paris}
      MANAGEMENT_PASSWORD: ${CLIPROXY_MANAGEMENT_KEY:-cortex2026}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8317/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Code Indexer (GitNexus) ──
  gitnexus:
    image: ghcr.io/ngojclee/cortex-gitnexus:latest
    container_name: cortex-gitnexus
    restart: unless-stopped
    cpus: "${GITNEXUS_CPUS:-2.0}"
    mem_limit: "${GITNEXUS_MEM_LIMIT:-3g}"
    volumes:
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/gitnexus-data:/root/.gitnexus
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/api-data:/app/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      TZ: ${TZ:-Europe/Paris}
      PORT: 4848
      NODE_OPTIONS: "--max-old-space-size=2048"
      GITNEXUS_STARTUP_INDEXING: "${GITNEXUS_STARTUP_INDEXING:-true}"
      GITNEXUS_STARTUP_INDEXING_DELAY_SECONDS: "${GITNEXUS_STARTUP_INDEXING_DELAY_SECONDS:-15}"
      GITNEXUS_AUTO_DISCOVER: "${GITNEXUS_AUTO_DISCOVER:-true}"
      GITNEXUS_AUTO_DISCOVER_MAX_REPOS: "${GITNEXUS_AUTO_DISCOVER_MAX_REPOS:-0}"
      GITNEXUS_ANALYZE_COOLDOWN_SECONDS: "${GITNEXUS_ANALYZE_COOLDOWN_SECONDS:-90}"
      GITNEXUS_ANALYZE_TIMEOUT_SECONDS: "${GITNEXUS_ANALYZE_TIMEOUT_SECONDS:-900}"
      GITNEXUS_ANALYZE_ARGS: "--force"
      GITNEXUS_ANALYZE_NICE: "${GITNEXUS_ANALYZE_NICE:-15}"
      GITNEXUS_ANALYZE_IONICE_CLASS: "${GITNEXUS_ANALYZE_IONICE_CLASS:-2}"
      GITNEXUS_ANALYZE_IONICE_LEVEL: "${GITNEXUS_ANALYZE_IONICE_LEVEL:-7}"

  # ── Dashboard API + Web UI ──
  cortex-api:
    image: ghcr.io/ngojclee/cortex-api:latest
    container_name: cortex-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/api-data:/app/data
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/gitnexus-data:/root/.gitnexus
      - ${STACK_DATA_ROOT:-/home/Docker/cortex-hub}/cliproxy-auth:/app/cliproxy-auth
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-Europe/Paris}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_PATH: /app/data/cortex.db
      QDRANT_URL: http://qdrant:6333
      LLM_PROXY_URL: ${LLM_PROXY_URL:-http://llm-proxy:8317}
      CLIPROXY_AUTH_DIR: /app/cliproxy-auth
      CLIPROXY_MANAGEMENT_KEY: ${CLIPROXY_MANAGEMENT_KEY:-cortex2026}
      GITNEXUS_URL: http://gitnexus:4848
      CORTEX_ACCESS_URL: ${CORTEX_ACCESS_URL:-10.21.1.108}
      CORTEX_ACCESS_PORT: ${API_PORT:-4000}
      CORTEX_PUBLIC_URL: ${CORTEX_PUBLIC_URL:-cortexhub.lengoc.me}
      DASHBOARD_URL: ${DASHBOARD_URL:-}
      NEXT_PUBLIC_CORTEX_ACCESS_URL: ${CORTEX_ACCESS_URL:-10.21.1.108}
      NEXT_PUBLIC_CORTEX_ACCESS_PORT: ${API_PORT:-4000}
      NEXT_PUBLIC_CORTEX_PUBLIC_URL: ${CORTEX_PUBLIC_URL:-cortexhub.lengoc.me}
      MCP_INTERNAL_URL: http://cortex-mcp:8317
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-168}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - qdrant
      - llm-proxy
      - gitnexus

  # ── MCP Gateway (reverse-proxied via cortex-api on /mcp) ──
  cortex-mcp:
    image: ghcr.io/ngojclee/cortex-mcp:latest
    container_name: cortex-mcp
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Paris}
      PORT: 8317
      NODE_ENV: ${NODE_ENV:-production}
      DASHBOARD_API_URL: http://cortex-api:4000
      QDRANT_URL: http://qdrant:6333
      CLIPROXY_URL: ${LLM_PROXY_URL:-http://llm-proxy:8317}
      GITNEXUS_URL: http://gitnexus:4848
      MCP_SERVER_NAME: cortex-hub
      MCP_SERVER_VERSION: "0.3.0.0"
      MCP_AUTH_REQUIRED: "true"
      CORTEX_ACCESS_URL: ${CORTEX_ACCESS_URL:-10.21.1.108}
      CORTEX_ACCESS_PORT: ${API_PORT:-4000}
      PUBLIC_URL: ${CORTEX_PUBLIC_URL:-cortexhub.lengoc.me}
    depends_on:
      - cortex-api
      - qdrant
      - llm-proxy
      - gitnexus

  # ── Auto-updater ──
  watchtower:
    image: containrrr/watchtower:latest
    container_name: cortex-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-Europe/Paris}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "false"
